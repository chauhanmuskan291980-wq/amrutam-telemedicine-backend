version: "3.9"

services:
  api:
    build: .
    container_name: amrutam_api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: amrutam_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amrutam_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: amrutam_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: